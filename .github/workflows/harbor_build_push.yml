name: Build and Push to Harbor

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login \
            ${{ secrets.HARBOR_REGISTRY }} \
            -u '${{ secrets.HARBOR_USERNAME }}' \
            --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/eurogips_landing:latest \
            -t ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/eurogips_landing:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/eurogips_landing:latest
          docker push ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/eurogips_landing:${{ github.sha }}
